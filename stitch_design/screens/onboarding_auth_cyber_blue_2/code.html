<style>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        }

        }

            filter: drop-shadow(0 0 12px rgba(0, 240, 255, 0.4));

            box-shadow: inset 0 0 15px rgba(182, 196, 255, 0.1);

      min-height: max(884px, 100dvh);

<body class="bg-surface-dim text-on-surface font-body-md selection:bg-primary-container selection:text-white overflow-hidden h-screen w-full flex flex-col">
<!-- Top Navigation Bar (Hidden on onboarding as per UX Goal) -->
<!-- Main Content Canvas -->
<main class="flex-1 relative flex flex-col items-center justify-center overflow-hidden bg-slate-950 px-gutter">
<!-- Background Decorative Elements -->
<div class="absolute inset-0 cyber-grid opacity-50"></div>
<div class="absolute top-[-10%] right-[-10%] w-64 h-64 bg-primary-container/20 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-80 h-80 bg-tertiary-container/20 rounded-full blur-[120px]"></div>
<!-- Hero Section: Mascot & Branding -->
<div class="relative z-10 w-full max-w-md flex flex-col items-center gap-xl">
<!-- Animated-Feel Floating Badge -->
<div class="flex items-center gap-xs bg-black border-2 border-primary-container px-md py-xs rounded-full hard-shadow-sm mb-[-16px] animate-bounce">
<span class="material-symbols-outlined text-primary text-[16px]">bolt</span>
<span class="font-label-sm text-label-sm text-primary uppercase">Alpha Protocol Active</span>
</div>
<!-- Title & Branding -->
<div class="text-center">
<h1 class="font-display-xl text-display-xl text-primary drop-shadow-[4px_4px_0px_rgba(0,0,0,1)] uppercase italic tracking-tighter">
                    WELCOME TO <br/>
<span class="text-secondary-fixed">CYBERTAP</span>
</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-sm max-w-[280px] mx-auto leading-tight">
                    The ultimate high-speed tap-to-earn cyberpunk adventure.
                </p>
</div>
<!-- Mascot Illustration -->
<div class="relative w-full aspect-square max-w-[320px] flex items-center justify-center">
<!-- Background Glow -->
<div class="absolute inset-0 bg-primary-container/30 rounded-full blur-3xl opacity-50 animate-pulse"></div>
<!-- Main Image -->
<div class="relative z-10 w-[85%] h-[85%] border-4 border-black rounded-[40px] overflow-hidden bg-slate-900 hard-shadow bloom-cyan rotate-[-2deg]">
<img alt="Cyber Mascot" class="w-full h-full object-cover scale-110" data-alt="Futuristic cyberpunk robot mascot with neon blue glowing visor and metallic plating, vibrant cartoon style, dynamic pose, deep blue background with circuitry patterns" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB7BlqBfo23GVBh9wjUAj8lzbweouJ8KYJS7b19Bxam1YX7fM4rW9Oip0bt1jPu9tQpkUx7NuwimPG3HF3mkpqClhfZkcH4f-xuGuAl528BjCxqw53cLNen5HanEWVRqOLHaFGIosOJxFtqKt64oMorkzVJEFOMMi5AtCYuFiRVcrSO1c8-GWWjtRq4r2NJI3LK6bUtbQnkeeSCEDnu0hgtjvYQicgHL42BnJRKZ-BZUR3ZrgHQ_FijvOc7mQAxFAuY8B2i9hN_c5KH"/>
<!-- Overlay Scanlines -->
<div class="absolute inset-0 pointer-events-none opacity-20 bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.25)_50%),linear-gradient(90deg,rgba(255,0,0,0.06),rgba(0,255,0,0.02),rgba(0,0,255,0.06))] bg-[length:100%_2px,3px_100%]"></div>
</div>
<!-- Floating Accents -->
<div class="absolute top-4 right-4 w-12 h-12 bg-tertiary-container border-2 border-black rounded-lg hard-shadow-sm flex items-center justify-center rotate-[15deg]">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">token</span>
</div>
<div class="absolute bottom-10 left-0 w-16 h-16 bg-secondary-fixed border-2 border-black rounded-full hard-shadow-sm flex items-center justify-center -rotate-[12deg]">
<span class="material-symbols-outlined text-black font-black" style="font-variation-settings: 'FILL' 1;">rocket_launch</span>
</div>
</div>
<!-- Action Area -->
<div class="w-full flex flex-col gap-md mt-lg px-gutter">
<!-- Primary Action -->
<button class="w-full bg-[#CCFF00] hover:bg-[#d9ff33] text-black font-headline-md text-headline-md py-lg rounded-2xl border-4 border-black hard-shadow active-press flex items-center justify-center gap-sm transition-all group">
<span class="material-symbols-outlined text-[32px] group-hover:scale-110 transition-transform" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
                    START ADVENTURE
                </button>
<!-- Secondary Action: Connect -->
<button class="w-full bg-slate-900 hover:bg-slate-800 text-white font-body-lg text-body-lg py-md rounded-xl border-4 border-black hard-shadow-sm active-press flex items-center justify-center gap-sm transition-all group">
<span class="bg-[#0088cc] p-1 rounded-md">
<svg class="w-5 h-5 fill-white" viewbox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.02-1.96 1.25-5.54 3.69-.52.35-.99.53-1.41.52-.46-.01-1.35-.26-2.01-.48-.81-.27-1.45-.42-1.39-.89.03-.25.38-.51 1.07-.78 4.2-1.82 7-3.03 8.4-3.61 4-.1.17 1.61 2.09 4.1.2 4.64.8z"></path></svg>
</span>
                    CONNECT TELEGRAM
                </button>
<!-- Footer Legal/Info -->
<p class="text-center font-label-sm text-[10px] text-slate-500 uppercase tracking-widest mt-sm">
                    By entering you agree to our <span class="text-primary-fixed underline">terms of play</span>
</p>
</div>
</div>
<!-- Floating Particles/Elements -->
<div class="absolute top-1/4 left-10 opacity-30 animate-pulse">
<span class="material-symbols-outlined text-primary text-[40px]">blur_on</span>
</div>
<div class="absolute bottom-1/4 right-10 opacity-30 animate-pulse" style="animation-delay: 1s;">
<span class="material-symbols-outlined text-tertiary text-[48px]">grid_view</span>
</div>
</main>
<!-- Navigation Shell (Suppressed as per "Linear/Transactional" rule for onboarding) -->
</body></html>
