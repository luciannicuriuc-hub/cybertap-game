<body class="bg-background text-on-background font-body-md min-h-screen overflow-hidden">
<!-- Mock Background Page (Tapper UI) -->
<main class="relative h-screen w-full flex flex-col items-center justify-center bg-surface-container-lowest p-6 opacity-40 grayscale-[50%] blur-sm pointer-events-none">
<div class="w-full max-w-md h-full flex flex-col">
<!-- Background Header -->
<header class="flex justify-between items-center mb-10">
<div class="h-12 w-12 rounded-full bg-surface-variant border-2 border-black shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]"></div>
<div class="h-8 w-32 rounded-lg bg-surface-variant border-2 border-black shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]"></div>
</header>
<!-- Central Tapper Asset -->
<div class="flex-grow flex items-center justify-center">
<div class="relative w-64 h-64 rounded-full bg-primary-container/20 border-4 border-primary shadow-[0_0_50px_rgba(0,85,255,0.3)] flex items-center justify-center">
<div class="w-48 h-48 rounded-full bg-primary-container border-4 border-black shadow-[0_10px_0_0_rgba(0,0,0,1)]"></div>
</div>
</div>
<!-- Bottom Stats -->
<div class="grid grid-cols-2 gap-4 mb-20">
<div class="h-16 rounded-xl bg-surface-container-high border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]"></div>
<div class="h-16 rounded-xl bg-surface-container-high border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]"></div>
</div>
</div>
</main>
<!-- Overlay Container -->
<div class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-950/80 backdrop-blur-md">
<!-- Reward Popup Modal -->
<div class="relative w-full max-w-sm bg-slate-900 border-4 border-black rounded-[32px] shadow-[0_20px_60px_-15px_rgba(0,0,0,0.5),8px_8px_0px_0px_rgba(0,0,0,1)] overflow-hidden flex flex-col items-center text-center p-8">
<!-- Blue Glow Burst Background -->
<div class="absolute top-0 left-0 w-full h-full pointer-events-none overflow-hidden -z-10">
<div class="absolute -top-1/4 left-1/2 -translate-x-1/2 w-[200%] h-[200%] bg-[radial-gradient(circle,rgba(0,85,255,0.25)_0%,transparent_70%)]"></div>
<!-- Ray Effect (CSS only) -->
<div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-full h-full opacity-30 flex items-center justify-center">
<div class="w-full h-full flex flex-wrap justify-center content-center animate-pulse">
<!-- Decorative rays could be added here with rotation transforms -->
</div>
</div>
</div>
<!-- Header -->
<h2 class="font-display-xl text-headline-md text-secondary-fixed drop-shadow-[0_2px_0_rgba(0,0,0,1)] italic mb-6">
        CONGRATULATIONS!
      </h2>
<!-- Chest Icon Container -->
<div class="relative w-48 h-48 mb-8 flex items-center justify-center">
<!-- Inner Glow -->
<div class="absolute inset-0 bg-primary-container/30 blur-2xl rounded-full"></div>
<!-- Chest Asset -->
<div class="relative z-10 flex flex-col items-center">
<span class="material-symbols-outlined text-[112px] text-[#FFD700] drop-shadow-[0_4px_0_rgba(0,0,0,1)]" style="font-variation-settings: 'FILL' 1;">
            inventory_2
          </span>
<!-- Particle effects simulated by small spans -->
<span class="absolute -top-2 -right-4 material-symbols-outlined text-secondary-fixed text-2xl" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="absolute top-12 -left-6 material-symbols-outlined text-primary text-xl" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="absolute -bottom-2 right-12 material-symbols-outlined text-tertiary text-lg" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
</div>
<!-- Rewards Section -->
<div class="w-full space-y-4 mb-10">
<!-- Gem Reward -->
<div class="flex items-center justify-between bg-black/40 border-2 border-primary-container rounded-2xl p-4 shadow-[4px_4px_0px_0px_rgba(0,0,0,0.5)]">
<div class="flex items-center gap-3">
<div class="bg-primary-container p-2 rounded-lg border-2 border-black">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">diamond</span>
</div>
<span class="font-headline-md text-white">+500 GEMS</span>
</div>
<span class="material-symbols-outlined text-secondary-fixed">arrow_upward</span>
</div>
<!-- Energy Reward -->
<div class="flex items-center justify-between bg-black/40 border-2 border-tertiary-container rounded-2xl p-4 shadow-[4px_4px_0px_0px_rgba(0,0,0,0.5)]">
<div class="flex items-center gap-3">
<div class="bg-tertiary-container p-2 rounded-lg border-2 border-black">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
<span class="font-headline-md text-white">+100 ENERGY</span>
</div>
<span class="material-symbols-outlined text-secondary-fixed">bolt</span>
</div>
</div>
<!-- Claim Button -->
<button class="group relative w-full h-16 bg-[#CCFF00] border-4 border-black rounded-2xl shadow-[0_6px_0_0_rgba(0,0,0,1)] active:translate-y-1 active:shadow-[0_2px_0_0_rgba(0,0,0,1)] transition-all flex items-center justify-center">
<span class="font-display-xl text-headline-md text-black italic">CLAIM REWARD</span>
</button>
<!-- Tap to Dismiss Hint -->
<p class="mt-6 font-label-sm text-slate-500 tracking-widest uppercase">
        Tap anywhere to skip
      </p>
</div>
</div>
<!-- Shared Component: TopAppBar (Hidden by Overlay, but defined) -->
<nav class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-slate-950 border-b-4 border-black shadow-[0px_4px_0px_0px_rgba(0,0,0,1)] pointer-events-none">

</div>
<span class="font-['Plus_Jakarta_Sans'] font-black uppercase tracking-tighter text-xl text-blue-500 italic drop-shadow-[2px_2px_0px_rgba(0,0,0,1)]">CYBERTAP</span>
</div>
<div class="bg-slate-900 border-2 border-black px-3 py-1 rounded-lg">
<span class="font-['Plus_Jakarta_Sans'] font-black uppercase tracking-tighter text-blue-500">1,250 GEMS</span>
</div>
</nav>
<!-- Shared Component: BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-2 pb-6 pt-3 bg-slate-900 border-t-4 border-black shadow-[0px_-4px_0px_0px_rgba(0,0,0,1)] rounded-t-2xl pointer-events-none">
<div class="flex flex-col items-center justify-center bg-[#CCFF00] text-black border-2 border-black rounded-xl px-3 py-1 scale-110 shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-['Plus_Jakarta_Sans'] font-extrabold text-[10px] uppercase">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-500 opacity-80">
<span class="material-symbols-outlined">insights</span>
<span class="font-['Plus_Jakarta_Sans'] font-extrabold text-[10px] uppercase">Progress</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-500 opacity-80">
<span class="material-symbols-outlined">shopping_bag</span>
<span class="font-['Plus_Jakarta_Sans'] font-extrabold text-[10px] uppercase">Shop</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-500 opacity-80">
<span class="material-symbols-outlined">military_tech</span>
<span class="font-['Plus_Jakarta_Sans'] font-extrabold text-[10px] uppercase">Ranks</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-500 opacity-80">
<span class="material-symbols-outlined">account_circle</span>
<span class="font-['Plus_Jakarta_Sans'] font-extrabold text-[10px] uppercase">Profile</span>
</div>
</nav>
</body></html>
